name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        if: github.event_name == 'pull_request'
        run: |
          # 检查 PR 中的 commit 消息是否符合 Conventional Commits 规范
          COMMITS=$(git log --format="%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          PATTERN="^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+"
          while IFS= read -r commit; do
            # 跳过 merge commit
            if [[ "$commit" == Merge* ]]; then
              continue
            fi
            if [[ ! "$commit" =~ $PATTERN ]]; then
              echo "❌ 不符合规范的 commit: $commit"
              echo "格式要求: <type>(<scope>): <subject>"
              exit 1
            fi
          done <<< "$COMMITS"
          echo "✅ 所有 commit 消息格式正确"

      - name: Check for sensitive files
        run: |
          # 检查是否有敏感文件被提交（排除模板文件）
          SENSITIVE_PATTERNS=(".env" "config.json" "*.pem" "*.key" "credentials*")
          EXCLUDE_PATTERNS=(".env.example" ".env.template" ".env.sample")
          FOUND=0
          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              SKIP=0
              for exclude in "${EXCLUDE_PATTERNS[@]}"; do
                if [[ "$file" == *"$exclude"* ]]; then
                  SKIP=1
                  break
                fi
              done
              if [ "$SKIP" -eq 0 ]; then
                echo "❌ 发现可能包含敏感信息的文件: $file"
                FOUND=1
              fi
            done < <(git ls-files | grep "$pattern" || true)
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "请移除敏感文件或将其添加到 .gitignore"
            exit 1
          fi
          echo "✅ 未发现敏感文件"
